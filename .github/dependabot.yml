# Actualizaciones automáticas de dependencias (parches de seguridad incluidos).
# Complementa al pip-audit del CI: Dependabot abre PRs cuando hay versiones nuevas
# o CVEs; pip-audit falla el build si una dependencia tiene un CVE conocido.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      python-deps:               # una sola PR agrupando todas las deps de Python
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
