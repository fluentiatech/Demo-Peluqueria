name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # auditoría semanal de dependencias (nuevas CVE)

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Lint + escaneo de código (ruff/bandit)
        run: python -m ruff check .

      - name: Tipos (mypy)
        run: python -m mypy app

      - name: Tests
        run: python -m pytest -q

      - name: Escaneo de vulnerabilidades de dependencias (pip-audit)
        run: python -m pip_audit -r requirements.txt --strict
