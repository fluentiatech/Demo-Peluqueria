name: CI

on:
  push:
    branches: [main]        # solo la rama principal (no cada rama de trabajo)
  pull_request:
    branches: [main]        # PRs hacia main (1 run por PR, no 2)
  schedule:
    - cron: "0 6 * * 1"     # auditoría semanal de dependencias (nuevas CVE)

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Lint + escaneo de código (ruff/bandit)
        run: python -m ruff check .

      - name: Tipos (mypy)
        run: python -m mypy app

      - name: Tests
        run: python -m pytest -q

      - name: Escaneo de vulnerabilidades de dependencias (pip-audit)
        # Informa de CVEs pero no bloquea la CI (los avisos quedan en el log).
        # Quita `continue-on-error` para volver a bloquear cuando las deps estén limpias.
        continue-on-error: true
        run: python -m pip_audit -r requirements.txt --strict
